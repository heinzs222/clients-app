name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Production build
        run: npm run build
      - name: Function syntax
        run: |
          node --check netlify/functions/create-client-capi.mjs
          node --check netlify/functions/workspace-api.mjs
          node --check netlify/functions/client-gateway.mjs
          node --check netlify/functions/script-binding.mjs
          node --check netlify/functions/identity-signup.mjs
      - name: Authentication checks
        run: |
          node scripts/auth-error-test.mjs
          node scripts/authenticator-disabled-test.mjs
      - name: Endpoint binding checks
        run: node scripts/binding-test.mjs
      - name: GoHighLevel blog checks
        run: node scripts/blog-cluster-test.mjs
      - name: Beginner SEO checks
        run: node scripts/meta-beginner-seo-test.mjs
      - name: Shared public layout checks
        run: node scripts/public-layout-test.mjs
      - name: Generated endpoint contracts
        run: npm run test:generated
